set_charge_schedule:
  name: Set charge schedule
  description: Update the vehicle's charge prohibition schedule. Pass an empty list to clear all rules.

  fields:
    config_entry:
      name: Vehicle
      description: Select the My Honda+ vehicle to control.
      required: true
      selector:
        config_entry:
          integration: myhondaplus
    rules:
      name: Schedule rules
      description: >
        List of up to 2 rules. Each rule must include days as a comma-separated list
        such as "mon,tue,wed", location as "home" or "all", and start/end times in
        24-hour HH:MM format.
      required: true
      example: '[{"days": "mon,tue,wed,thu,fri", "location": "home", "start_time": "22:00", "end_time": "06:00"}]'
      selector:
        object:

climate_on:
  name: Start climate with settings
  description: Apply the requested climate settings and then send the remote climate-start command to the vehicle.

  fields:
    config_entry:
      name: Vehicle
      description: Select the My Honda+ vehicle to control.
      required: true
      selector:
        config_entry:
          integration: myhondaplus
    temp:
      name: Temperature
      description: Climate temperature preset.
      required: false
      default: "normal"
      example: "normal"
      selector:
        select:
          options:
            - "cooler"
            - "normal"
            - "hotter"
    duration:
      name: Duration
      description: Climate run time in minutes.
      required: false
      default: 30
      example: 30
      selector:
        select:
          options:
            - "10"
            - "20"
            - "30"
    defrost:
      name: Defrost
      description: Whether defrost should be enabled for this start command.
      required: false
      default: true
      example: true
      selector:
        boolean:

set_climate_schedule:
  name: Set climate schedule
  description: Update the vehicle's climate pre-conditioning schedule. Pass an empty list to clear all rules.

  fields:
    config_entry:
      name: Vehicle
      description: Select the My Honda+ vehicle to control.
      required: true
      selector:
        config_entry:
          integration: myhondaplus
    rules:
      name: Schedule rules
      description: >
        List of up to 7 rules. Each rule must include days as a comma-separated list
        such as "mon,tue,wed" and a start time in 24-hour HH:MM format.
      required: true
      example: '[{"days": "mon,tue,wed,thu,fri", "start_time": "07:00"}]'
      selector:
        object:

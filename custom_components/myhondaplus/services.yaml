set_charge_schedule:
  name: Set charge prohibition schedule
  description: Set the charge prohibition schedule (up to 2 rules). Pass an empty list to clear.
  fields:
    rules:
      name: Rules
      description: >
        List of up to 2 schedule rules. Each rule has: days (comma-separated, e.g. "mon,tue,wed"),
        location ("home" or "all"), start_time ("HH:MM"), end_time ("HH:MM").
      required: true
      example: '[{"days": "mon,tue,wed,thu,fri", "location": "home", "start_time": "22:00", "end_time": "06:00"}]'
      selector:
        object:

climate_on:
  name: Climate on with settings
  description: Start climate pre-conditioning with specific temperature, duration, and defrost settings.
  fields:
    temp:
      name: Temperature
      description: Temperature setting (cooler, normal, hotter)
      required: false
      default: "normal"
      example: "normal"
      selector:
        select:
          options:
            - "cooler"
            - "normal"
            - "hotter"
    duration:
      name: Duration
      description: Duration in minutes (10, 20, or 30)
      required: false
      default: 30
      example: 30
      selector:
        select:
          options:
            - 10
            - 20
            - 30
    defrost:
      name: Defrost
      description: Enable defrost
      required: false
      default: true
      example: true
      selector:
        boolean:

set_climate_schedule:
  name: Set climate schedule
  description: Set the climate pre-conditioning schedule (up to 7 rules). Pass an empty list to clear.
  fields:
    rules:
      name: Rules
      description: >
        List of up to 7 schedule rules. Each rule has: days (comma-separated, e.g. "mon,tue,wed"),
        start_time ("HH:MM").
      required: true
      example: '[{"days": "mon,tue,wed,thu,fri", "start_time": "07:00"}]'
      selector:
        object:

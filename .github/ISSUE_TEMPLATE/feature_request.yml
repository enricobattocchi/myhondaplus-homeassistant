name: Feature request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true
  - type: textarea
    id: use_case
    attributes:
      label: Use case
      description: How would you use this feature? What problem does it solve?
  - type: input
    id: vehicle
    attributes:
      label: Vehicle model
      placeholder: "e.g. Honda e, e:Ny1, ZR-V"
